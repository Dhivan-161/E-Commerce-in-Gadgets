<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elite Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: url("login.png") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .login-card{
            background: rgba(0,0,0,0.90);
            color: #070707;
            border-radius: 15px;
        }
        .login-card h1,
        .login-card p,
        .login-card label,
        .login-card .form-check-label{
            color: #fff;
        }

        .login-card .form-control{
            background-color: #212529;
            color: #fff;
            border: 1px solid #6c757d;
        }

        .login-card .form-control::placeholder{
            color: #ced4da;
        }

        .login-card .form-control:focus{
            background-color: #212529;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: none;
        }

        .login-card a{
            color: #0dcaf0;
            text-decoration: none;
        }

        .login-card a:hover{
            color: #66d9ff;
            text-decoration: underline;
        }

        footer{
            background: rgba(0,0,0,0.85);
            color: white;
        }

        footer a{
            color: #0dcaf0;
            text-decoration: none;
        }

        footer a:hover{
            color: white;
        }
    </style>
</head>

<body>

<main class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg login-card">

                <div class="card-body p-4">

                    <h1 class="text-center mb-3">Login to Your Account</h1>

                    <p class="text-center">
                        Enter your details below to access your account.
                    </p>

                    <form action="#" method="POST">

                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                placeholder="example@domain.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password"
                                placeholder="Enter Password"
                                required>
                        </div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="remember"
                                name="remember">

                            <label class="form-check-label" for="remember">
                                Remember me on this device
                            </label>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-light text-dark fw-bold">
                                Login
                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <p>
                            <a href="forgot-password.html">
                                Forgot Password?
                            </a>
                        </p>

                        <p>
                            Don't have an account?
                            <a href="signup.html">
                                Create one here
                            </a>
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<footer class="text-center py-3">

    <p class="mb-2">&copy; 2026 Elite Store. All Rights Reserved.</p>

    <ul class="list-inline mb-0">

        <li class="list-inline-item">
            <a href="privacy-policy.html">Privacy Policy</a>
        </li>

        <li class="list-inline-item">
            |
        </li>

        <li class="list-inline-item">
            <a href="terms.html">Terms &amp; Conditions</a>
        </li>

    </ul>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
