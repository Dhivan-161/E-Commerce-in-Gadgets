<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">
    <style>
        body{
            background: url("login.png") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .login-card{
            background: rgba(0,0,0,0.90);
            color: #fff;
            border-radius: 15px;
        }

        .login-card h1,
        .login-card p,
        .login-card label,
        .login-card .form-check-label{
            color: #fff;
        }

        .login-card .form-control{
            background-color: #212529;
            color: #fff;
            border: 1px solid #6c757d;
        }

        .login-card .form-control::placeholder{
            color: #ced4da;
        }

        .login-card .form-control:focus{
            background-color: #212529;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: none;
        }

        .login-card a{
            color: #0dcaf0;
            text-decoration: none;
        }

        .login-card a:hover{
            color: #66d9ff;
            text-decoration: underline;
        }

        footer{
            background: rgba(0,0,0,0.85);
            color: white;
        }

        footer a{
            color: #0dcaf0;
            text-decoration: none;
        }

        footer a:hover{
            color: white;
        }
    </style>

<main class="container my-5">

    <section class="card shadow p-4 mx-auto" style="max-width:600px;">


        <h1 class="text-center">
            Create an Account
        </h1>


        <p class="text-center text-muted">
            Please fill in this form to create an account.
        </p>


        <form action="#" method="POST">


            <div class="mb-3">

                <label for="fullname" class="form-label">
                    Full Name:
                </label>

                <input 
                type="text" 
                id="fullname" 
                name="fullname" 
                class="form-control"
                placeholder="Irfan" 
                required>

            </div>



            <div class="mb-3">

                <label for="email" class="form-label">
                    Email Address:
                </label>

                <input 
                type="email" 
                id="email" 
                name="email"
                class="form-control"
                placeholder="example@domain.com" 
                required>

            </div>



            <div class="mb-3">

                <label for="phone" class="form-label">
                    Phone Number:
                </label>

                <input 
                type="tel" 
                id="phone" 
                name="phone"
                class="form-control"
                placeholder="123-456-7890">

            </div>



            <div class="mb-3">

                <label for="dob" class="form-label">
                    Date of Birth:
                </label>

                <input 
                type="date" 
                id="dob" 
                name="dob"
                class="form-control">

            </div>



            <div class="mb-3">

                <label class="form-label">
                    Gender:
                </label>
                <br>


                <input 
                type="radio" 
                id="male" 
                name="gender" 
                value="male"
                class="form-check-input">

                <label for="male">
                    Male
                </label>



                <input 
                type="radio" 
                id="female" 
                name="gender" 
                value="female"
                class="form-check-input ms-3">

                <label for="female">
                    Female
                </label>



                <input 
                type="radio" 
                id="other" 
                name="gender" 
                value="other"
                class="form-check-input ms-3">

                <label for="other">
                    Other
                </label>


            </div>



            <div class="mb-3">

                <label for="password" class="form-label">
                    Password:
                </label>

                <input 
                type="password" 
                id="password" 
                name="password"
                class="form-control"
                minlength="8" 
                required>

            </div>




            <div class="mb-3">

                <label for="confirm-password" class="form-label">
                    Confirm Password:
                </label>

                <input 
                type="password" 
                id="confirm-password" 
                name="confirm-password"
                class="form-control"
                minlength="8" 
                required>

            </div>




            <div class="form-check mb-3">

                <input 
                type="checkbox" 
                id="terms" 
                name="terms"
                class="form-check-input"
                required>


                <label for="terms" class="form-check-label">

                    I accept the 
                    <a href="terms.html" target="_blank">
                        Terms & Conditions
                    </a>

                    and

                    <a href="privacy-policy.html" target="_blank">
                        Privacy Policy
                    </a>

                </label>

            </div>




            <button type="submit" class="btn btn-primary">
                Register
            </button>


            <button type="reset" class="btn btn-secondary">
                Reset Form
            </button>



        </form>




        <br>


        <p class="text-center">

            Already have an account?

            <a href="login.html">
                Log in here
            </a>.

        </p>


    </section>


</main>




<hr>



<footer class="bg-dark text-white text-center p-3">


    <p>
        &copy; 2026 Elite Store. All Rights Reserved.
    </p>



    <ul class="list-inline">


        <li class="list-inline-item">

            <a href="privacy-policy.html" class="text-white text-decoration-none">
                Privacy Policy
            </a>

        </li>



        <li class="list-inline-item">

            <a href="terms.html" class="text-white text-decoration-none">
                Terms & Conditions
            </a>

        </li>


    </ul>


</footer>




<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
